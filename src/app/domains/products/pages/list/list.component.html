<div class="flex mt-5 flex-col md:flex-row md:space-x-4">
  <div class="w-full mb-4 md:w-56">
    <p>status: {{ categoriesResource.isLoading() }}</p>
    <button
      class="w-full mb-4 bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600"
      (click)="reloadCategories()"
    >
      Reload Categories
    </button>
    <button
      class="w-full mb-4 bg-red-500 text-white py-2 px-4 rounded hover:bg-red-600"
      (click)="resetCategories()"
    >
      Reset Categories
    </button>
    <button class="w-full mb-4 bg-green-500 text-white py-2 px-4 rounded hover:bg-green-600" (click)="reloadProducts()">
      Reload Products
    </button> 
    <ul class="text-center md:text-left">
      <li>
        <a routerLink="/">All</a>
      </li>
      @for (category of categoriesResource.value(); track category) {
        <li>
          <a routerLink="/category/{{ category.slug }}">{{
            category.name
          }}</a>
        </li>
      }
    </ul>
  </div>
  <div class="grid grid-cols-2 gap-8 w-full md:grid-cols-4">
    @for (product of productsResource.value(); track product) {
      <app-product [product]="product" (addToCart)="addToCart($event)" />
    }
  </div>
</div>
